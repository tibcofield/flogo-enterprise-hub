<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flogo Chatbot</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-robot"></i>
                    <h1>Flogo Chatbot</h1>
                </div>
                <div class="connection-controls">
                    <div class="connection-status" id="connectionStatus">
                        <span class="status-indicator" id="statusIndicator"></span>
                        <span id="statusText">Disconnected</span>
                    </div>
                    <button class="btn btn-primary" id="connectBtn">
                        <i class="fas fa-plug"></i> Connect
                    </button>
                    <button class="btn btn-secondary" id="disconnectBtn" disabled>
                        <i class="fas fa-unlink"></i> Disconnect
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar for Chat Sessions -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2><i class="fas fa-comments"></i> Chat Sessions</h2>
                    <button class="btn btn-icon" id="newChatBtn" title="New Chat">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div class="chat-sessions" id="chatSessions">
                    <!-- Chat sessions will be dynamically added here -->
                </div>
            </aside>

            <!-- Chat Area -->
            <main class="chat-area">
                <div class="chat-header">
                    <div class="chat-title">
                        <i class="fas fa-comments"></i>
                        <span id="currentChatTitle">Select or create a chat</span>
                        <button class="btn-clear" id="clearChatBtn" title="Clear chat history">
                            <i class="fas fa-broom"></i>
                        </button>
                    </div>
                    <div class="ws-config">
                        <input type="text" id="wsUrlInput" placeholder="WebSocket URL"
                               value="ws://localhost:8082/ws/chat">
                        <button class="btn btn-small" id="updateWsUrlBtn" title="Update WebSocket URL">
                            <i class="fas fa-sync"></i>
                        </button>
                    </div>
                </div>

                <!-- Messages Container -->
                <div class="messages-container" id="messagesContainer">
                    <div class="welcome-message">
                        <i class="fas fa-robot"></i>
                        <h2>Welcome to Flogo Chatbot</h2>
                        <p>Create a new chat session to get started</p>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="input-container">
                        <textarea id="messageInput" placeholder="Type your message here..." 
                                  rows="1" disabled></textarea>
                        <button class="btn btn-send" id="sendBtn" disabled>
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
